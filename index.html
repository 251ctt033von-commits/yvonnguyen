<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <header>
        <div class="logo-container">
            <img src="logo.webp" alt="Spotify Logo" class="logo-img">
            <h1>Spotify</h1>
        </div>
    </header>

    <div class="container">

        
        <nav>
            <div class="menu">
                <div class="box">🏠 Trang chủ</div>
                <div class="box">🔍 Tìm kiếm</div>
                <div class="box">🎵 Thư viện</div>
            </div>

            <h3>Playlist</h3>

            <div class="playlist">
                <div class="box">🎧 Top Hits</div>
                <div class="box">🔥 EDM Mix</div>
                <div class="box">🌙 Chill Vibes</div>
                <div class="box">🎤 V-Pop</div>
            </div>
        </nav>

        
        <section class="content">

        
            <article class="banner">
                <h2>Nhạc Hot 2026</h2>
                <p>Nghe những bài hát thịnh hành nhất hôm nay.</p>
                <button>▶ Phát ngay</button>
            </article>

        
            <article class="songs">
                <h2>Bài Hát Nổi Bật</h2>

                <div class="song-list">

                    <div class="card">
                        <img src="pic1.jpg" alt="">
                        <h3>Đức Trường</h3>
                        <p>Chill</p>
                    </div>

                    <div class="card">
                        <img src="pic2.jpg" alt="">
                        <h3>T.R.I</h3>
                        <p>Remix</p>
                    </div>

                    <div class="card">
                        <img src="pic3.png" alt="">
                        <h3>NHONHO</h3>
                        <p>V-Pop</p>
                    </div>

                    <div class="card">
                        <img src="pic4.jpg" alt="">
                        <h3>ENGLE</h3>
                        <p>V-Pop</p>
                    </div>

                </div>
            </article>

        </section>

    </div>

    <footer class="player">
        🎵 Đang phát: Summer - Pop Music
    </footer>

</body>
</html>
